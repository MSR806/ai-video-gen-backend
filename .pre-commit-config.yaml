repos:
  - repo: local
    hooks:
      - id: ruff-format-check
        name: ruff format --check
        entry: uv run ruff format --check
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy src tests
        entry: uv run mypy src tests
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest -q
        entry: uv run pytest -q
        language: system
        pass_filenames: false
