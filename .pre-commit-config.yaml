default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy src tests
        entry: uv run mypy src tests
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest -q
        entry: uv run pytest -q
        language: system
        pass_filenames: false
