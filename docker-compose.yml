services:
  db:
    image: postgres:16-alpine
    container_name: ai-video-gen-db
    environment:
      POSTGRES_DB: ai_video_gen
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_video_gen"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-video-gen-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/ai_video_gen
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uv sync --frozen &&
             uv run alembic upgrade head &&
             uv run uvicorn ai_video_gen_backend.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
