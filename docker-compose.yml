services:
  db:
    image: postgres:16-alpine
    container_name: ai-video-gen-db
    environment:
      POSTGRES_DB: ai_video_gen
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_video_gen"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ai-video-gen-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: ai-video-gen-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/ai-video-gen-media || true &&
      mc anonymous set download local/ai-video-gen-media
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-video-gen-api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_started
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/ai_video_gen
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: ai-video-gen-media
      STORAGE_REGION: us-east-1
      STORAGE_SECURE: "false"
      MAX_UPLOAD_SIZE_MB: 50
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uv sync --frozen &&
             uv run alembic upgrade head &&
             uv run uvicorn ai_video_gen_backend.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
  minio_data:
